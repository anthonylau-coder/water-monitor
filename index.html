<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能水位監控 - 完整數據顯示版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            transition: background 0.8s;
            min-height: 100vh;
        }
        .status-bar { 
            padding: 10px; 
            font-size: 14px; 
            text-align: center; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .online { background: rgba(0, 68, 0, 0.8); color: #00ff00; border-color: #00ff00; }
        .offline { background: rgba(68, 0, 0, 0.8); color: #ff0000; border-color: #ff0000; }
        .refresh-btn {
            background: transparent;
            border: 1px solid currentColor;
            color: inherit;
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .main-display { 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 15px; 
        }
        .label { 
            font-size: 12px; 
            color: #888; 
            letter-spacing: 1px; 
            margin-bottom: 5px;
        }
        .value { 
            font-size: 80px; 
            font-weight: bold; 
            color: #00ff00; 
            transform: scale(0.9, 1); 
            transform-origin: left; 
            line-height: 1; 
            display: inline-block;
        }
        .unit { 
            font-size: 24px; 
            color: #00ff00; 
            margin-left: 5px; 
            display: inline-block;
        }
        .temp-val { 
            font-size: 30px; 
            font-weight: bold; 
            color: #00ffff; 
        }
        .temp-unit { 
            font-size: 16px; 
            color: #00ffff; 
            margin-left: 5px; 
        }
        .sub-data { 
            display: flex; 
            justify-content: space-between; 
            font-size: 12px; 
            color: #666; 
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .sub-data-item {
            background: #111;
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sub-data-item span:first-child {
            color: #888;
        }
        .sub-data-item .value-highlight {
            color: #00ff00;
            font-weight: bold;
        }
        #alarm-box { 
            display: none; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            text-align: center; 
            font-size: 18px; 
            font-weight: bold; 
            animation: blink 1.5s infinite; 
        }
        @keyframes blink { 
            0% { opacity: 1; } 
            50% { opacity: 0.7; } 
            100% { opacity: 1; } 
        }
        .chart-section { 
            background: #111; 
            padding: 15px; 
            border-radius: 10px; 
            height: 400px;
            margin-top: 20px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #888;
            font-size: 12px;
        }
        .chart-controls {
            display: flex;
            gap: 5px;
        }
        .chart-btn {
            background: #222;
            border: 1px solid #444;
            color: #888;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }
        .chart-btn:hover {
            background: #333;
            color: #fff;
        }
        .chart-btn.active {
            background: #00ff00;
            color: #000;
            border-color: #00ff00;
        }
        .loading { 
            text-align: center; 
            padding: 40px; 
            color: #666;
            font-size: 14px;
        }
        .last-update { 
            font-size: 11px; 
            color: #444; 
            text-align: right; 
            margin-top: 5px; 
        }
        .data-source { 
            font-size: 10px; 
            color: #333; 
            text-align: center; 
            margin-top: 10px; 
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .stat-card {
            background: #111;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #222;
            transition: all 0.3s;
        }
        .stat-card:hover {
            border-color: #00ff00;
            transform: translateY(-2px);
        }
        .stat-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #00ff00;
        }
        .stat-unit {
            font-size: 10px;
            color: #666;
            margin-left: 2px;
        }
        
        /* Custom tooltip styles */
        .custom-tooltip {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(5px);
            min-width: 220px;
        }
        .tooltip-title {
            color: #00ff00;
            font-weight: bold;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .tooltip-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            padding: 3px 0;
        }
        .tooltip-label {
            color: #888;
        }
        .tooltip-value {
            color: #00ff00;
            font-weight: bold;
        }
        .tooltip-value.temp { color: #00ffff; }
        .tooltip-value.warning { color: #ff9900; }
        .tooltip-divider {
            height: 1px;
            background: #333;
            margin: 8px 0;
        }
        .tooltip-footer {
            color: #666;
            font-size: 10px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="status" class="status-bar offline">
        <span>連線至 Firebase...</span>
        <button class="refresh-btn" onclick="refreshAllData()">🔄 手動刷新</button>
    </div>
    
    <div id="alarm-box"></div>

    <div class="main-display">
        <div class="label">WATER LEVEL</div>
        <div>
            <span id="level" class="value">--</span>
            <span class="unit">mm</span>
        </div>
        
        <div class="label" style="margin-top:15px;">WATER TEMPERATURE</div>
        <div>
            <span id="temp" class="temp-val">--.-</span>
            <span class="temp-unit">°C</span>
        </div>

        <div class="sub-data">
            <div class="sub-data-item">
                <span>📶 訊號強度</span>
                <span class="value-highlight" id="sig_display">--</span>
                <span>dBm</span>
            </div>
            <div class="sub-data-item">
                <span>⚡ 傳感器電壓</span>
                <span class="value-highlight" id="sensor_vol_display">--</span>
                <span>V</span>
            </div>
            <div class="sub-data-item">
                <span>🔋 繼電器電壓</span>
                <span class="value-highlight" id="relay_vol_display">--</span>
                <span>V</span>
            </div>
        </div>
        
        <div id="full_date" style="color: #aaa; margin-top: 10px; font-size: 13px; text-align: right;">
            ⏱️ 更新時間: 讀取雲端中...
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">今日最高水位</div>
            <div><span class="stat-value" id="todayMax">--</span><span class="stat-unit">mm</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">今日平均水位</div>
            <div><span class="stat-value" id="todayAvg">--</span><span class="stat-unit">mm</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">平均電壓</div>
            <div><span class="stat-value" id="avgVoltage">--</span><span class="stat-unit">V</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">數據點數量</div>
            <div><span class="stat-value" id="dataPoints">--</span><span class="stat-unit">筆</span></div>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-header">
            <span>📊 水位歷史趨勢 (滑鼠移至數據點查看詳細資訊)</span>
            <div class="chart-controls">
                <button class="chart-btn" onclick="loadHistoryData(10)">10筆</button>
                <button class="chart-btn active" onclick="loadHistoryData(30)">30筆</button>
                <button class="chart-btn" onclick="loadHistoryData(50)">50筆</button>
                <button class="chart-btn" onclick="loadHistoryData(100)">100筆</button>
            </div>
        </div>
        <canvas id="waterChart"></canvas>
    </div>
    
    <div class="last-update" id="lastUpdateTime"></div>
    <div class="data-source">📡 資料來源: Firebase 即時資料庫</div>

    <!-- Custom tooltip container -->
    <div id="chartTooltip" class="custom-tooltip" style="position: absolute; display: none;"></div>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBAzQFLLDACisyZN6CEIFunkA2by0LzocE",
            authDomain: "water-monitor-system-cbccd.firebaseapp.com",
            databaseURL: "https://water-monitor-system-cbccd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "water-monitor-system-cbccd",
            storageBucket: "water-monitor-system-cbccd.firebasestorage.app",
            messagingSenderId: "924884619328",
            appId: "1:924884619328:web:0e187dd574cd54ee4e8fa5"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Global variables
        let currentLevel = 0;
        let currentVolAlarm = false;
        let chartDataLimit = 30;
        let chartUpdateTimer = null;
        let historyDataStore = []; // Store complete history data for tooltips
        
        // Chart initialization with custom plugin for tooltips
        const ctx = document.getElementById('waterChart').getContext('2d');
        const waterChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    label: '水位 (mm)',
                    data: [], 
                    borderColor: '#00ff00', 
                    backgroundColor: 'rgba(0, 255, 0, 0.1)', 
                    borderWidth: 2, 
                    fill: true, 
                    tension: 0.3, 
                    pointRadius: 4,
                    pointHoverRadius: 8,
                    pointBackgroundColor: '#00ff00',
                    pointBorderColor: '#fff',
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: '#00ff00'
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        enabled: false, // Disable default tooltip
                        external: customTooltipHandler // Use custom tooltip
                    }
                }, 
                scales: { 
                    x: { 
                        ticks: { color: '#888', font: {size: 10} },
                        grid: { color: '#222' },
                        title: {
                            display: true,
                            text: '時間',
                            color: '#666'
                        }
                    }, 
                    y: { 
                        beginAtZero: true, 
                        ticks: { color: '#888' },
                        grid: { color: '#222' },
                        title: {
                            display: true,
                            text: '水位 (mm)',
                            color: '#666'
                        }
                    } 
                },
                animation: {
                    duration: 300
                },
                hover: {
                    mode: 'index',
                    intersect: false
                }
            }
        });

        // Custom tooltip handler
        function customTooltipHandler(context) {
            const tooltipEl = document.getElementById('chartTooltip');
            
            // Hide if no tooltip
            if (context.tooltip.opacity === 0) {
                tooltipEl.style.display = 'none';
                return;
            }
            
            // Get data point
            const dataIndex = context.tooltip.dataPoints[0].dataIndex;
            const datasetIndex = context.tooltip.dataPoints[0].datasetIndex;
            const rawValue = context.tooltip.dataPoints[0].raw;
            
            // Get complete data from store
            const dataPoint = historyDataStore[dataIndex];
            
            if (!dataPoint) return;
            
            // Build tooltip HTML
            let tooltipHtml = '<div class="tooltip-title">📊 完整數據</div>';
            
            // Time
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">⏱️ 時間</span>
                <span class="tooltip-value">${dataPoint.time || dataPoint.collectionTime || '--'}</span>
            </div>`;
            
            // Water Level
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">💧 水位</span>
                <span class="tooltip-value">${dataPoint.waterLevel || dataPoint.level || '--'} mm</span>
            </div>`;
            
            // Water Temperature
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">🌡️ 水溫</span>
                <span class="tooltip-value temp">${dataPoint.waterTemperature || dataPoint.temp || '--'} °C</span>
            </div>`;
            
            tooltipHtml += '<div class="tooltip-divider"></div>';
            
            // Sensor Voltage
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">⚡ 傳感器電壓</span>
                <span class="tooltip-value">${dataPoint.sensorVoltage || dataPoint.vol || '--'} V</span>
            </div>`;
            
            // Relay Voltage
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">🔋 繼電器電壓</span>
                <span class="tooltip-value">${dataPoint.relayVoltage || '--'} V</span>
            </div>`;
            
            // Signal Strength
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">📶 訊號強度</span>
                <span class="tooltip-value">${dataPoint.signalStrength || dataPoint.sig || '--'} dBm</span>
            </div>`;
            
            // Device Code
            tooltipHtml += `<div class="tooltip-row">
                <span class="tooltip-label">📱 設備編碼</span>
                <span class="tooltip-value">${dataPoint.deviceCode || '2025122201'}</span>
            </div>`;
            
            // Alarm Code if exists
            if (dataPoint.alarmCode && dataPoint.alarmCode !== '0') {
                tooltipHtml += `<div class="tooltip-row">
                    <span class="tooltip-label">⚠️ 警報代碼</span>
                    <span class="tooltip-value warning">${dataPoint.alarmCode}</span>
                </div>`;
            }
            
            tooltipHtml += '<div class="tooltip-footer">滑鼠移至其他點查看詳細數據</div>';
            
            tooltipEl.innerHTML = tooltipHtml;
            
            // Position tooltip
            const position = context.tooltip;
            tooltipEl.style.display = 'block';
            tooltipEl.style.left = position.caretX + 'px';
            tooltipEl.style.top = position.caretY - 20 + 'px';
            tooltipEl.style.transform = 'translate(-50%, -100%)';
        }

        // ==================== FIREBASE DATA LISTENERS ====================

        function setupFirebaseListeners() {
            const connectedRef = db.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                const statusEl = document.getElementById('status');
                const statusSpan = statusEl.querySelector('span');
                if (snap.val() === true) {
                    statusSpan.innerText = "● 已連接至 Firebase";
                    statusEl.className = "status-bar online";
                } else {
                    statusSpan.innerText = "○ Firebase 離線";
                    statusEl.className = "status-bar offline";
                }
            });

            const latestStatusRef = db.ref('latest_status');
            latestStatusRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    updateUIFromFirebase(data);
                    updateAlarmLogic(data);
                }
            }, (error) => {
                console.error('Error reading latest status:', error);
            });

            loadHistoryData(chartDataLimit);
        }

        function loadHistoryData(limit = 30) {
            document.querySelectorAll('.chart-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(limit.toString())) {
                    btn.classList.add('active');
                }
            });
            
            chartDataLimit = limit;
            
            // Show loading state
            waterChart.data.labels = ['載入中...'];
            waterChart.data.datasets[0].data = [null];
            waterChart.update();
            
            const historyRef = db.ref('history').orderByKey().limitToLast(limit);
            historyRef.once('value', (snapshot) => {
                const labels = [];
                const values = [];
                const store = [];
                let maxValue = 0;
                let totalValue = 0;
                let totalVoltage = 0;
                let voltageCount = 0;
                
                const entries = [];
                snapshot.forEach((child) => {
                    entries.push({ key: child.key, value: child.val() });
                });
                
                entries.reverse();
                
                entries.forEach((entry) => {
                    const data = entry.value;
                    store.push(data); // Store complete data for tooltips
                    
                    let timeLabel = formatTimeForChart(data);
                    labels.push(timeLabel);
                    
                    let levelValue = extractLevelValue(data);
                    values.push(levelValue);
                    
                    if (levelValue > maxValue) maxValue = levelValue;
                    totalValue += levelValue;
                    
                    // Calculate average voltage
                    if (data.sensorVoltage) {
                        totalVoltage += parseFloat(data.sensorVoltage);
                        voltageCount++;
                    } else if (data.vol) {
                        totalVoltage += parseFloat(data.vol);
                        voltageCount++;
                    }
                });
                
                // Store for tooltips
                historyDataStore = store;
                
                // Update chart
                updateChart(labels, values);
                
                // Update statistics
                if (values.length > 0) {
                    const avg = Math.round(totalValue / values.length);
                    const avgVoltage = voltageCount > 0 ? (totalVoltage / voltageCount).toFixed(2) : '--';
                    
                    document.getElementById('todayMax').innerText = maxValue;
                    document.getElementById('todayAvg').innerText = avg;
                    document.getElementById('avgVoltage').innerText = avgVoltage;
                    document.getElementById('dataPoints').innerText = values.length;
                }
                
                console.log(`Loaded ${values.length} history entries`);
                
            }, (error) => {
                console.error('Error loading history:', error);
            });
        }

        function formatTimeForChart(data) {
            if (data.collectionTime) {
                const timeParts = data.collectionTime.split(' ');
                if (timeParts.length > 1) {
                    return timeParts[1].substring(0, 5);
                }
                return data.collectionTime.substring(0, 5);
            } else if (data.time) {
                const timeParts = data.time.split(' ');
                if (timeParts.length > 1) {
                    return timeParts[1].substring(0, 5);
                }
                return data.time.substring(0, 5);
            }
            return '--:--';
        }

        function extractLevelValue(data) {
            if (data.level !== undefined) return parseInt(data.level);
            if (data.waterLevel_mm !== undefined) return parseInt(data.waterLevel_mm);
            if (data.waterLevel) {
                return Math.round(parseFloat(data.waterLevel) * 1000);
            }
            return 0;
        }

        function updateUIFromFirebase(data) {
            const level = data.level || data.waterLevel_mm || 0;
            const temp = data.temp || data.waterTemperature || '--.-';
            const sig = data.sig || data.signalStrength || '--';
            const sensorVol = data.vol || data.sensorVoltage || '--';
            const relayVol = data.relayVoltage || '--';
            const time = data.time || data.collectionTime || getCurrentTimeString();
            
            document.getElementById('level').innerText = level;
            document.getElementById('temp').innerText = temp;
            document.getElementById('sig_display').innerText = sig;
            document.getElementById('sensor_vol_display').innerText = sensorVol;
            document.getElementById('relay_vol_display').innerText = relayVol;
            document.getElementById('full_date').innerHTML = "⏱️ 更新時間: " + time;
            document.getElementById('lastUpdateTime').innerText = "最後頁面更新: " + new Date().toLocaleString('zh-HK');
        }

        function updateAlarmLogic(data) {
            const level = parseInt(data.level || data.waterLevel_mm || 0);
            currentLevel = (level >= 300) ? 3 : (level >= 120 ? 2 : (level >= 70 ? 1 : 0));
            
            const voltage = parseFloat(data.vol || data.sensorVoltage || 5);
            currentVolAlarm = (voltage > 0 && voltage < 3.4);
            
            renderAlarmUI();
        }

        function updateChart(labels, values) {
            waterChart.data.labels = labels;
            waterChart.data.datasets[0].data = values;
            waterChart.update();
        }

        function renderAlarmUI() {
            const box = document.getElementById('alarm-box');
            
            if (currentLevel > 0) {
                box.style.display = "block";
                const colors = ["", "#443300", "#d35400", "#660000"];
                const messages = ["", "⚠️ 低水位警告 Lv.1", "⚠️ 中水位警告 Lv.2", "⚠️ 高水位警告 Lv.3"];
                box.innerText = messages[currentLevel];
                box.style.background = colors[currentLevel];
                document.body.style.background = colors[currentLevel];
            } else if (currentVolAlarm) {
                box.style.display = "block"; 
                box.innerText = "⚠️ 設備電池電量低";
                box.style.background = "#555500"; 
                document.body.style.background = "#333300";
            } else {
                box.style.display = "none"; 
                document.body.style.background = "#000";
            }
        }

        function getCurrentTimeString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        function initializeFromFirebase() {
            return db.ref('latest_status').once('value')
                .then((snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        updateUIFromFirebase(data);
                        updateAlarmLogic(data);
                    }
                    return data;
                })
                .catch(error => {
                    console.error('Error initializing from Firebase:', error);
                });
        }

        function refreshAllData() {
            const refreshBtn = document.querySelector('.refresh-btn');
            const originalText = refreshBtn.innerText;
            refreshBtn.innerText = '🔄 刷新中...';
            refreshBtn.disabled = true;
            
            Promise.all([
                initializeFromFirebase(),
                loadHistoryData(chartDataLimit)
            ]).then(() => {
                setTimeout(() => {
                    refreshBtn.innerText = originalText;
                    refreshBtn.disabled = false;
                    
                    const statusSpan = document.querySelector('#status span');
                    const originalStatus = statusSpan.innerText;
                    statusSpan.innerText = '✓ 資料已刷新';
                    setTimeout(() => {
                        statusSpan.innerText = originalStatus;
                    }, 2000);
                }, 500);
            });
        }

        function startAutoRefresh() {
            if (chartUpdateTimer) {
                clearInterval(chartUpdateTimer);
            }
            
            chartUpdateTimer = setInterval(() => {
                console.log('Auto-refreshing chart...');
                loadHistoryData(chartDataLimit);
            }, 30000);
        }

        // ==================== INITIALIZATION ====================

        function init() {
            console.log('Initializing Firebase display with enhanced tooltips...');
            
            document.getElementById('level').innerText = '--';
            
            initializeFromFirebase().then(() => {
                loadHistoryData(chartDataLimit);
                startAutoRefresh();
            });
            
            setupFirebaseListeners();
        }

        window.addEventListener('load', init);

        window.addEventListener('beforeunload', () => {
            if (chartUpdateTimer) {
                clearInterval(chartUpdateTimer);
            }
        });

        window.loadHistoryData = loadHistoryData;
        window.refreshAllData = refreshAllData;

    </script>
</body>
</html>
