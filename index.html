<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能水位監控 - 互動增強版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; transition: background 0.8s; min-height: 100vh; }
        .status-bar { padding: 10px; font-size: 14px; text-align: center; margin-bottom: 15px; border-radius: 8px; font-weight: bold; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .online { background: rgba(0, 68, 0, 0.8); color: #00ff00; border-color: #00ff00; }
        .main-display { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .label { font-size: 12px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
        .value { font-size: 80px; font-weight: bold; color: #00ff00; line-height: 1; }
        .unit { font-size: 24px; color: #00ff00; margin-left: 5px; }
        .sub-data { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-top: 10px; }
        #alarm-box { display: none; padding: 15px; margin: 10px 0; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        /* 圖表容器 */
        .chart-container { background: #111; padding: 15px; border-radius: 10px; height: 350px; position: relative; cursor: crosshair; }
        
        /* 懸浮大地顯示視窗 (浮動在鼠標旁) */
        #floating-tooltip {
            position: absolute;
            display: none;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #00ff00;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            min-width: 180px;
        }
        .tooltip-date { color: #aaa; font-size: 12px; margin-bottom: 4px; }
        .tooltip-val { color: #00ff00; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status" class="status-bar online">
        <span>● 已連接至 Firebase</span>
        <button onclick="location.reload()" style="background:none; border:none; color:#00ff00; cursor:pointer; font-size:16px;">🔄</button>
    </div>
    
    <div id="alarm-box"></div>

    <div class="main-display">
        <div class="label">REAL-TIME WATER LEVEL</div>
        <div style="display:flex; align-items:baseline;">
            <div id="level" class="value">--</div>
            <div class="unit">mm</div>
        </div>
        
        <div class="label" style="margin-top:10px;">TEMPERATURE</div>
        <div id="temp" style="font-size: 30px; font-weight: bold; color: #00ffff;">--.- °C</div>

        <div class="sub-data">
            <div id="full_date">更新時間: 讀取中...</div>
            <span>訊號: <span id="sig_display">--</span> dBm</span>
            <span>電壓: <span id="vol_display">--</span> V</span>
        </div>
    </div>

    <div class="chart-container" id="chart-area">
        <div class="label">水位歷史趨勢</div>
        <div id="floating-tooltip"></div>
        <canvas id="waterChart"></canvas>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBAzQFLLDACisyZN6CEIFunkA2by0LzocE",
            databaseURL: "https://water-monitor-system-cbccd-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let waterChart;
        const chartDataLimit = 30;

        function initChart() {
            const ctx = document.getElementById('waterChart').getContext('2d');
            waterChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#00ff00', backgroundColor: 'rgba(0, 255, 0, 0.1)', fill: true, tension: 0.3, pointHoverRadius: 8 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            reverse: true, // 時間由右至左
                            ticks: { 
                                color: '#666', 
                                font: { size: 9 },
                                maxRotation: 45,
                                minRotation: 45 
                            } 
                        },
                        y: { beginAtZero: true, ticks: { color: '#444' } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false } // 禁用預設，改用自定義
                    },
                    // 當滑鼠移動或按下時觸發
                    onHover: (event, elements) => {
                        const tooltip = document.getElementById('floating-tooltip');
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const fullLabel = waterChart.data.labels[index];
                            const val = waterChart.data.datasets[0].data[index];
                            
                            tooltip.style.display = 'block';
                            tooltip.style.left = (event.x + 20) + 'px';
                            tooltip.style.top = (event.y - 40) + 'px';
                            tooltip.innerHTML = `
                                <div class="tooltip-date">${fullLabel}</div>
                                <div class="tooltip-val">${val} <span style="font-size:14px">mm</span></div>
                            `;
                        } else {
                            tooltip.style.display = 'none';
                        }
                    }
                }
            });
        }

        function setupFirebaseListeners() {
            db.ref('latest_status').on('value', (s) => { if(s.val()) updateUI(s.val()); });

            // 增量更新歷史數據
            db.ref('history').limitToLast(chartDataLimit).on('child_added', (snapshot) => {
                const d = snapshot.val();
                const level = d.level !== undefined ? d.level : Math.round(parseFloat(d.waterLevel || 0) * 1000);
                
                // X軸標籤包含完整日期，換行顯示以節省空間
                const fullTime = d.time || "";
                const label = fullTime.includes(' ') ? fullTime.replace(' ', '\n') : fullTime;
                
                waterChart.data.labels.push(label);
                waterChart.data.datasets[0].data.push(level);

                if (waterChart.data.labels.length > chartDataLimit) {
                    waterChart.data.labels.shift();
                    waterChart.data.datasets[0].data.shift();
                }
                waterChart.update('none');
            });
        }

        function updateUI(data) {
            const level = data.level !== undefined ? data.level : Math.round(parseFloat(data.waterLevel || 0) * 1000);
            document.getElementById('level').innerText = level;
            document.getElementById('temp').innerText = (data.temp || data.waterTemperature || "--") + " °C";
            document.getElementById('sig_display').innerText = data.sig || data.signalStrength || "--";
            document.getElementById('vol_display').innerText = data.vol || data.sensorVoltage || "--";
            document.getElementById('full_date').innerText = "更新時間: " + (data.time || "--");
            
            // 警報邏輯
            let lv = (level >= 300) ? 3 : (level >= 120 ? 2 : (level >= 70 ? 1 : 0));
            const box = document.getElementById('alarm-box');
            if (lv > 0) {
                box.style.display = "block";
                box.innerText = "【警告】水位異常 Lv." + lv;
                document.body.style.background = ["", "#443300", "#663300", "#660000"][lv];
            } else {
                box.style.display = "none";
                document.body.style.background = "#000";
            }
        }

        window.onload = () => { initChart(); setupFirebaseListeners(); };
    </script>
</body>
</html>
